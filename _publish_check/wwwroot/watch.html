<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="SunPhim - Xem phim online chất lượng cao">
    <title id="pageTitle">SunPhim - Đang tải...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/netflix.css">
</head>
<body class="player-page">
    <!-- Minimal Header for Player Page -->
    <header class="header" id="header" style="background: rgba(0,0,0,0.95);">
        <div class="header-container">
            <div class="header-left">
                <a href="/" class="logo">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M4 3h16a1 1 0 0 1 1 1v4.5a2.5 2.5 0 0 1-5 0V5H4v13h1a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1H4V4a1 1 0 0 1 1-1z"/>
                    </svg>
                    SunPhim
                </a>
            </div>
            <div class="header-right">
                <a href="/" class="btn btn-secondary" style="font-size:0.8rem;padding:0.4rem 1rem;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                    Trang chủ
                </a>
            </div>
        </div>
    </header>

    <div class="player-container" style="padding-top:calc(var(--header-height) + 1rem);">
        <!-- Player Controls -->
        <div class="player-controls">
            <div class="player-info">
                <span class="player-title" id="playerTitle">Đang tải...</span>
            </div>
            <div class="player-nav" id="playerNav">
                <button class="player-nav-btn" id="prevEpisode" disabled>‹ Tập trước</button>
                <button class="player-nav-btn" id="nextEpisode" disabled>Tập sau ›</button>
            </div>
        </div>

        <!-- Player Wrapper -->
        <div class="player-wrapper" id="playerWrapper">
            <div class="loading-spinner"></div>
        </div>

        <!-- Episode Mini List -->
        <div class="episodes-mini-list" id="episodesMiniList"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/api.js?v=20260409"></script>
    <script src="/js/app.js?v=20260409"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const episodeId = params.get('episode');
            const movieSlug = params.get('movie');

            if (!episodeId || !movieSlug) {
                document.getElementById('playerWrapper').innerHTML = `
                    <div class="player-error">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="15" y1="9" x2="9" y2="15"/>
                            <line x1="9" y1="9" x2="15" y2="15"/>
                        </svg>
                        <p>Không tìm thấy tập phim</p>
                    </div>`;
                return;
            }

            loadEpisodePlayer(movieSlug, parseInt(episodeId));
        });
    </script>
</body>
</html>
